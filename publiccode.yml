publiccodeYmlVersion: "0.5"

name: Repo Docs Generator
url: https://github.com/developer-overheid-nl/repo-docs-generator
landingURL: https://developer-overheid-nl.github.io/repo-docs-generator/

softwareType: standalone/web

platforms:
  - web
  - linux
  - mac
  - windows

developmentStatus: development

description:
  nl:
    shortDescription: >-
      Een webtool en CLI om repositories te voorzien van een publiccode.yml
      en de juiste markdown bestanden.
    longDescription: |
      De Repo Docs Generator is een webapplicatie en CLI-tool waarmee
      ontwikkelaars eenvoudig een publiccode.yml bestand kunnen genereren
      dat voldoet aan de Nederlandse standaard. Daarnaast kunnen ook andere
      benodigde bestanden voor een gezonde en toegankelijke repository worden
      gegenereerd, zoals README.md, SECURITY.md en CODE_OF_CONDUCT.md. De
      CLI-tool gebruikt dezelfde templates en validatie als de web-app en
      werkt op basis van een input-JSON-bestand.
  en:
    shortDescription: >-
      A web app and CLI to provide repositories with a publiccode.yml and
      the correct markdown files.
    longDescription: |
      The Repo Docs Generator is a web application and CLI tool that allows
      developers to easily generate a publiccode.yml file that complies with
      the Dutch standard. In addition, other required files for a healthy and
      accessible repository can also be generated, such as README.md,
      SECURITY.md and CODE_OF_CONDUCT.md. The CLI tool uses the same
      templates and validation as the web app and works from an input JSON
      file.

legal:
